family: UBQ
pfam:
  pf_re: '^PF00240([.][0-9]+)?$'
  ie_col: 9
  protein_col: 3
  ali_from_col: 12
  ali_to_col: 13

blast:
  task: blastp
  task_short: blastp-short
  evalue: 1e-10

# repeat=1 的关键词规则（NP-safe，可追溯）
# keep：polyubiquitin / ubiquitin（但避免把 RUB/NEDD8/SUMO 当作 UBQ）
rules:
  pos_re: '(polyubiquitin|ubiquitin-b|\\bubiquitin\\b)'
  neg_re: '(RUB1|RUB2|NEDD8|SUMO|ubiquitin-like domain-containing|phosphatidylinositol 4-kinase)'
